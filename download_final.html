<script>
const KEY='${KEY}';const cache={};
async function px(q){if(cache[q]!==undefined)return cache[q];cache[q]=null;try{const r=await fetch('https://api.pexels.com/v1/search?query='+encodeURIComponent(q)+'&per_page=1&orientation=landscape',{headers:{Authorization:KEY}});const d=await r.json();const p=d?.photos?.[0];if(p)cache[q]=p.src.medium;}catch(e){}return cache[q];}
async function loadImgs(){const imgs=Array.from(document.querySelectorAll('img[data-search]'));for(let i=0;i<imgs.length;i+=5){const batch=imgs.slice(i,i+5);await Promise.all(batch.map(async img=>{const src=await px(img.dataset.search);if(src){img.src=src;img.onload=()=>img.classList.remove('shimmer');img.onerror=()=>img.classList.remove('shimmer');}else img.classList.remove('shimmer');}));await new Promise(r=>setTimeout(r,250));}}
const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:.05});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
loadImgs();
<\/script>
</body>
</html>`;

function dl(){
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='index.html';a.click();
  URL.revokeObjectURL(url);
  document.getElementById('status').textContent='✅ ¡Descargado! Sube el index.html a GitHub y listo.';
}
</script>
